apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: php-hello
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-org>/gitops.git
    targetRevision: main
    path: charts/php-hello
  destination:
    server: https://kubernetes.default.svc
    namespace: php-hello
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
