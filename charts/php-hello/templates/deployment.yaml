apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-hello
  labels:
    app: php-hello
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: php-hello
  template:
    metadata:
      labels:
        app: php-hello
    spec:
{{- if .Values.vault.enabled }}
      initContainers:
        - name: vault-env
          image: hashicorp/vault:1.21.2
          command: ["/bin/sh", "-c"]
          args:
            - >
              export VAULT_ADDR={{ .Values.vault.address | quote }};
              export VAULT_TOKEN={{ .Values.vault.token | quote }};
              APP_ENV=$(vault kv get -field=APP_ENV {{ .Values.vault.secretPath | quote }});
              APP_MESSAGE=$(vault kv get -field=APP_MESSAGE {{ .Values.vault.secretPath | quote }});
              printf "export APP_ENV=\"%s\"\nexport APP_MESSAGE=\"%s\"\n" "$APP_ENV" "$APP_MESSAGE" > /vault/env/app-env;
          volumeMounts:
            - name: vault-env
              mountPath: /vault/env
{{- end }}
      containers:
        - name: php-apache
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
{{- if .Values.vault.enabled }}
          command: ["/bin/sh", "-c"]
          args:
            - . /vault/env/app-env && exec apache2-foreground
          volumeMounts:
            - name: vault-env
              mountPath: /vault/env
{{- end }}
          ports:
            - containerPort: 80
{{- if .Values.vault.enabled }}
      volumes:
        - name: vault-env
          emptyDir: {}
{{- end }}
