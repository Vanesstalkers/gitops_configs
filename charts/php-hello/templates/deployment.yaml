apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-hello
  labels:
    app: php-hello
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: php-hello
  template:
    metadata:
      labels:
        app: php-hello
{{- if .Values.vault.enabled }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/service: {{ .Values.vault.address | quote }}
        vault.hashicorp.com/auth-path: {{ .Values.vault.authPath | quote }}
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-app-env: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-app-env: |
{{ .Values.vault.envTemplate | indent 10 }}
{{- end }}
    spec:
      serviceAccountName: php-hello
      containers:
        - name: php-apache
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
{{- if .Values.vault.enabled }}
          command: ["/bin/sh", "-c"]
          args:
            - . /vault/secrets/app-env && exec apache2-foreground
{{- end }}
          ports:
            - containerPort: 80
